<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚合兽 - API 聚合网关管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
        }
        
        .logo span {
            color: #e2e8f0;
        }
        
        .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #1e293b;
            border-radius: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }
        
        .status-dot.degraded {
            background: #f59e0b;
        }
        
        .status-dot.error {
            background: #ef4444;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #94a3b8;
        }
        
        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #f8fafc;
        }
        
        .card-change {
            font-size: 14px;
            color: #22c55e;
        }
        
        .card-change.negative {
            color: #ef4444;
        }
        
        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        
        th {
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
        }
        
        td {
            color: #e2e8f0;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success {
            background: #166534;
            color: #86efac;
        }
        
        .badge-warning {
            background: #854d0e;
            color: #fde047;
        }
        
        .badge-error {
            background: #991b1b;
            color: #fca5a5;
        }
        
        .badge-info {
            background: #1e40af;
            color: #93c5fd;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #475569;
        }
        
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .source-health {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .health-bar {
            width: 60px;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: #22c55e;
            transition: width 0.3s;
        }
        
        .latency {
            font-family: monospace;
            font-size: 14px;
        }
        
        .latency-good {
            color: #22c55e;
        }
        
        .latency-warning {
            color: #f59e0b;
        }
        
        .latency-bad {
            color: #ef4444;
        }
        
        .api-key {
            font-family: monospace;
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            word-break: break-all;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .chart-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 10px 0;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, #3b82f6, #60a5fa);
            border-radius: 4px 4px 0 0;
            min-height: 20px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #1e293b;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🦾 <span>聚合兽</span></div>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Healthy</span>
                </div>
                <div class="status-item">
                    <span>数据源: <strong id="sources-count">0</strong></span>
                </div>
                <div class="status-item">
                    <span>API Keys: <strong id="keys-count">0</strong></span>
                </div>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">今日请求</span>
                    <span class="card-change">+12.5%</span>
                </div>
                <div class="card-value" id="requests-today">0</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">成功率</span>
                    <span class="card-change">+0.2%</span>
                </div>
                <div class="card-value" id="success-rate">99.8%</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">平均延迟</span>
                    <span class="card-change negative">+5ms</span>
                </div>
                <div class="card-value" id="avg-latency">0ms</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">活跃 Keys</span>
                </div>
                <div class="card-value" id="active-keys">0</div>
            </div>
        </div>
        
        <!-- 请求趋势图表 -->
        <div class="section">
            <div class="section-title">请求趋势 (最近 24 小时)</div>
            <div class="chart-container">
                <div class="chart-placeholder" id="chart"></div>
            </div>
        </div>
        
        <!-- 数据源状态 -->
        <div class="section">
            <div class="section-title">数据源状态</div>
            <table>
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>URL</th>
                        <th>健康度</th>
                        <th>延迟</th>
                        <th>成功率</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="sources-table">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #64748b;">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- API Keys -->
        <div class="section">
            <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>API Keys</span>
                <button class="btn btn-primary" onclick="showCreateKeyModal()">+ 创建 Key</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>Key</th>
                        <th>套餐</th>
                        <th>今日请求</th>
                        <th>限额</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="keys-table">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #64748b;">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <footer>
            聚合兽 v0.3.0 - API 聚合网关 | <a href="/docs" style="color: #3b82f6;">API 文档</a>
        </footer>
    </div>
    
    <!-- 创建 Key 模态框 -->
    <div class="modal" id="create-key-modal">
        <div class="modal-content">
            <div class="modal-title">创建 API Key</div>
            <div class="form-group">
                <label class="form-label">名称</label>
                <input type="text" class="form-input" id="key-name" placeholder="例如: 我的测试 Key">
            </div>
            <div class="form-group">
                <label class="form-label">套餐</label>
                <select class="form-select" id="key-tier">
                    <option value="free">Free (100 请求/天)</option>
                    <option value="developer">Developer (10,000 请求/天)</option>
                    <option value="pro">Pro (100,000 请求/天)</option>
                    <option value="enterprise">Enterprise (无限)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="hideCreateKeyModal()">取消</button>
                <button class="btn btn-primary" onclick="createKey()">创建</button>
            </div>
        </div>
    </div>
    
    <script>
        // API 基础 URL
        const API_BASE = window.location.origin;
        const MASTER_KEY = localStorage.getItem('masterKey') || prompt('请输入 Master Key:');
        localStorage.setItem('masterKey', MASTER_KEY);
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // 获取健康状态类
        function getHealthClass(rate) {
            if (rate >= 0.95) return 'success';
            if (rate >= 0.8) return 'warning';
            return 'error';
        }
        
        // 获取延迟类
        function getLatencyClass(ms) {
            if (ms < 200) return 'good';
            if (ms < 500) return 'warning';
            return 'bad';
        }
        
        // 加载数据源状态
        async function loadSources() {
            try {
                const res = await fetch(`${API_BASE}/v1/sources`);
                const data = await res.json();
                
                document.getElementById('sources-count').textContent = data.count;
                
                const tbody = document.getElementById('sources-table');
                tbody.innerHTML = '';
                
                for (const [name, sources] of Object.entries(data.sources)) {
                    const source = sources[0]; // 主数据源
                    const healthClass = getHealthClass(source.success_rate);
                    const latencyClass = getLatencyClass(source.avg_latency_ms);
                    
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${name}</strong></td>
                            <td style="font-size: 12px; color: #94a3b8;">${source.url.substring(0, 40)}...</td>
                            <td>
                                <div class="source-health">
                                    <div class="health-bar">
                                        <div class="health-fill" style="width: ${source.success_rate * 100}%"></div>
                                    </div>
                                    <span>${(source.success_rate * 100).toFixed(1)}%</span>
                                </div>
                            </td>
                            <td class="latency latency-${latencyClass}">${source.avg_latency_ms}ms</td>
                            <td>${(source.success_rate * 100).toFixed(1)}%</td>
                            <td><span class="badge badge-${healthClass}">${source.enabled ? '正常' : '禁用'}</span></td>
                        </tr>
                    `;
                }
            } catch (e) {
                console.error('加载数据源失败:', e);
            }
        }
        
        // 加载 API Keys
        async function loadKeys() {
            try {
                const res = await fetch(`${API_BASE}/v1/keys`, {
                    headers: { 'Authorization': `Bearer ${MASTER_KEY}` }
                });
                const data = await res.json();
                
                document.getElementById('keys-count').textContent = data.length;
                document.getElementById('active-keys').textContent = data.length;
                
                const tbody = document.getElementById('keys-table');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #64748b;">暂无 API Key</td></tr>';
                    return;
                }
                
                for (const key of data) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${key.name}</td>
                            <td class="api-key">${key.key_hash}</td>
                            <td><span class="badge badge-info">${key.tier}</span></td>
                            <td>-</td>
                            <td>${key.requests_limit === -1 ? '无限' : formatNumber(key.requests_limit)}/天</td>
                            <td>
                                <button class="btn btn-danger" onclick="revokeKey('${key.key_hash}')">吊销</button>
                            </td>
                        </tr>
                    `;
                }
            } catch (e) {
                console.error('加载 API Keys 失败:', e);
            }
        }
        
        // 加载健康状态
        async function loadHealth() {
            try {
                const res = await fetch(`${API_BASE}/v1/health`);
                const data = await res.json();
                
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                
                if (data.status === 'healthy') {
                    dot.className = 'status-dot';
                    text.textContent = 'Healthy';
                } else if (data.status === 'degraded') {
                    dot.className = 'status-dot degraded';
                    text.textContent = 'Degraded';
                } else {
                    dot.className = 'status-dot error';
                    text.textContent = 'Error';
                }
            } catch (e) {
                console.error('加载健康状态失败:', e);
            }
        }
        
        // 生成模拟图表
        function renderChart() {
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            
            // 模拟数据
            const data = Array(24).fill(0).map(() => Math.random() * 100 + 20);
            const max = Math.max(...data);
            
            for (const value of data) {
                const height = (value / max) * 100;
                chart.innerHTML += `<div class="chart-bar" style="height: ${height}%"></div>`;
            }
            
            // 模拟统计数据
            document.getElementById('requests-today').textContent = formatNumber(Math.floor(Math.random() * 5000 + 1000));
            document.getElementById('avg-latency').textContent = Math.floor(Math.random() * 100 + 50) + 'ms';
        }
        
        // 显示创建 Key 模态框
        function showCreateKeyModal() {
            document.getElementById('create-key-modal').classList.add('active');
        }
        
        // 隐藏创建 Key 模态框
        function hideCreateKeyModal() {
            document.getElementById('create-key-modal').classList.remove('active');
        }
        
        // 创建 Key
        async function createKey() {
            const name = document.getElementById('key-name').value;
            const tier = document.getElementById('key-tier').value;
            
            if (!name) {
                alert('请输入名称');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/v1/keys`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MASTER_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, tier })
                });
                
                const data = await res.json();
                
                if (data.key) {
                    alert(`API Key 创建成功！\n\n请保存以下 Key，只显示一次：\n\n${data.key}`);
                    hideCreateKeyModal();
                    loadKeys();
                } else {
                    alert('创建失败: ' + (data.detail || JSON.stringify(data)));
                }
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }
        
        // 吊销 Key
        async function revokeKey(keyHash) {
            if (!confirm('确定要吊销此 Key 吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/v1/keys/${keyHash}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${MASTER_KEY}` }
                });
                
                if (res.ok) {
                    loadKeys();
                } else {
                    alert('吊销失败');
                }
            } catch (e) {
                alert('吊销失败: ' + e.message);
            }
        }
        
        // 初始化
        loadHealth();
        loadSources();
        loadKeys();
        renderChart();
        
        // 定时刷新
        setInterval(loadHealth, 30000);
        setInterval(loadSources, 60000);
    </script>
</body>
</html>
