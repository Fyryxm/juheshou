version: '3.8'

services:
  juheshou:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MASTER_API_KEY=juheshou_master_key_change_me_in_production
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: